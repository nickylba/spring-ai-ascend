# Module metadata for agent-execution-engine.
# Required by CLAUDE.md Rule 31 (Independent Module Evolution).
# Authority: ADR-0066 + ADR-0072 (Engine Envelope + Strict Matching).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-execution-engine
kind: domain             # platform | domain | starter | bom | sample
version: 0.0.1-SNAPSHOT
semver_compatibility: experimental
description: "Heterogeneous execution engine surface — EngineRegistry, EngineEnvelope, ExecutorAdapter/Definition, Graph/AgentLoop reference adapters. Extracted from agent-runtime/engine + orchestration.spi per T2.B2."
architecture_doc: agent-execution-engine/ARCHITECTURE.md
dfx_doc: docs/dfx/agent-execution-engine.yaml
spi_packages:
  - ascend.springai.engine.spi
  - ascend.springai.service.runtime.orchestration.spi
allowed_dependencies:
  - agent-runtime-core     # shared kernel types (Run, RunContext, SuspendSignal) per ADR-0079
  - agent-middleware       # engine references HookPoint enum + RuntimeMiddleware listener
forbidden_dependencies:
  - agent-service          # engine is upstream of agent-service; reverse direction forbidden
  - agent-bus
  - agent-client
  - agent-evolve
deployment_plane: compute_control   # Rule 39 / P-I — engine runs in-process with the runtime kernel
