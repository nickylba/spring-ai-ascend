name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Maven build + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven verify (compile + unit + integration tests)
        run: ./mvnw -T 1C -B -ntp --strict-checksums verify

      - name: Architecture-sync gate (parallel)
        # The parallel wrapper runs the same 63+ rules across 8 workers,
        # cutting wall-clock from ~24min to ~7min on Windows/git-bash and
        # ~3x faster on Linux CI runners. Identical PASS/FAIL semantics.
        # Set GATE_PARALLEL=0 to fall back to the serial canonical script.
        run: bash gate/check_parallel.sh

      - name: Architecture-sync self-test
        run: bash gate/test_architecture_sync_gate.sh

      # Operator-shape smoke gate is intentionally NOT in CI until W0 build verification
      # lands (cycle-14 A1 user-chosen variant). The gate/run_operator_shape_smoke.sh script
      # exits 1 with FAIL_NEEDS_BUILD until 'mvn package' produces a JAR. Keeping it out of
      # CI (rather than masking with || true) makes CI status honest.
      # Reintroduce as a blocking step (no || true, no continue-on-error) once
      # agent-platform/target/agent-platform-*.jar is produced by mvn verify on CI.

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

  quickstart-smoke:
    # Rule 29.c — Quickstart CI smoke run (Wave 4 Track E).
    # Boots agent-service via the boot-classifier jar and asserts
    # GET /v1/health returns 200 within 60 seconds. Job failure is
    # a ship-blocking finding under Rule 9 (HTTP / API contract).
    name: Quickstart smoke (/v1/health)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Package agent-service
        run: ./mvnw -pl agent-service -am -B -ntp --strict-checksums package -DskipTests
      - name: Boot agent-service + poll /v1/health
        run: |
          set -e
          export SPRING_PROFILES_ACTIVE=dev
          export APP_POSTURE=dev
          java -jar agent-service/target/agent-service-0.1.0-SNAPSHOT-boot.jar &
          BOOT_PID=$!
          trap "kill $BOOT_PID 2>/dev/null || true" EXIT
          # Poll /v1/health until 200 with a 60-second deadline.
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/v1/health > /tmp/health.json 2>/dev/null; then
              echo "GET /v1/health -> 200 after ${i}s"
              cat /tmp/health.json
              exit 0
            fi
            sleep 1
          done
          echo "GET /v1/health did not return 200 within 60s"
          exit 1
