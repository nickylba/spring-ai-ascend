debug: false

spring:
  application:
    name: agent-task-collector-a2a

server:
  port: 13002
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info

agent-runtime:
  access:
    a2a:
      default-tenant-id: travel-tenant
      default-agent-id: task-collector-agent

task-collector-agent:
  checkpointer: in-memory
  llm:
    model-provider: ${LLM_PROVIDER:OpenAI}
    api-key: ${LLM_API_KEY:}
    api-base: ${LLM_API_BASE:http://localhost:4000/v1}
    model-name: ${LLM_MODEL:gpt-4o-mini}
    ssl-verify: ${LLM_SSL_VERIFY:false}
  max-iterations: ${TASK_COLLECTOR_MAX_ITERATIONS:6}
  default-user-id: ${TRAVELER_USER_ID:zhang3}
  default-city: ${DEFAULT_CITY:深圳}
  mcp:
    mode: ${TRAVEL_MCP_MODE:mock}
    calendar-enabled: ${TRAVEL_MCP_CALENDAR_ENABLED:true}
    todo-enabled: ${TRAVEL_MCP_TODO_ENABLED:true}
    policy-enabled: ${TRAVEL_MCP_POLICY_ENABLED:true}
    server-url: ${TRAVEL_MCP_SERVER_URL:http://localhost:19090}

logging:
  level:
    root: INFO
    com.huawei.ascend.examples.travel.taskcollector: INFO
    com.huawei.ascend.runtime: INFO
