schema: ascend-agent/v1

name: deep-research-agent
displayName: Deep Research Agent
description: >-
  Root DeepAgent that orchestrates plan_search, plan_read, and plan_verify
  sub-agents to produce a cited comparison report for LLM API vendors.

framework:
  type: openjiuwen
  agent: deepagent
  options:
    maxIterations: 10
    enableTaskLoop: true
    enableTaskPlanning: true
    language: cn
    workspacePath: ./target/deep-research-workspace

model:
  provider: ${DEEP_RESEARCH_LLM_PROVIDER}
  name: ${DEEP_RESEARCH_LLM_MODEL}
  baseUrl: ${DEEP_RESEARCH_LLM_API_BASE}
  apiKey: ${DEEP_RESEARCH_LLM_API_KEY}
  sslVerify: false

prompt:
  agentMd: ../prompts/deep-research-system-prompt.md
