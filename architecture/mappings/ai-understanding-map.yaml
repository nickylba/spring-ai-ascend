# =============================================================================
# AI Understanding Map — explicit queryable dual-track map
# =============================================================================
# Authority: ADR-0157 (EngineeringFrame Ontology / dual-track), ADR-0161
# (Card-over-DSL), ADR-0154 (Fact-Layer Authority). Role contract:
# docs/governance/ai-reading-path.yaml step 5 (demand_to_behavior_mapping).
# Schema: architecture/mappings/schema/ai-understanding-map.schema.yaml.
#
# WHAT THIS IS: a readable, queryable projection of the three axes
#   value     ProductClaim -> Requirement -> Feature -> FunctionPoint
#   structure Module -> EngineeringFrame -> FunctionPoint
#   evidence  FunctionPoint -> Contract -> GeneratedFact -> Gate
# plus the derived Feature -> traverses -> EngineeringFrame reconciliation.
#
# WHAT THIS IS NOT: an authority. It invents no id and no relationship. Every
# id below is declared upstream (engineering-frames.dsl / features.dsl /
# function-points.dsl / architecture/facts/generated/*.json). On any conflict
# the authority cascade wins: generated facts > DSL > Card/prose > this map.
# The reconcile step owns architecture-status.yaml and the gate wiring; this
# file is hand-authored interpretation and is kept id-consistent with the DSL.

version: 1
status: active
last_updated: "2026-05-31"

authority:
  cascade:
    - "architecture/facts/generated/*.json (generated facts — apex truth)"
    - "architecture/features/engineering-frames.dsl + features.dsl + function-points.dsl (DSL — structural/value source)"
    - "architecture/docs/L1/frames/*.md (Frame Cards — readable interpretation, ADR-0161)"
    - "architecture/mappings/ai-understanding-map.yaml (this map — readable projection, lowest authority)"
  primary_adrs:
    - adr/0157-engineering-frame-ontology
    - adr/0158-engine-port-transport-agnostic-boundary
    - adr/0161-engineering-frame-package-cluster-anchor-and-card-over-dsl
    - adr/0156-product-authority-and-traceability
    - adr/0154-fact-layer-authority
  invariant: "reads-not-decides; invents no id and no edge; every cited id resolves upstream in the authority cascade."

axes:
  value: "ProductClaim -> Requirement (ISO 29148) -> Feature (value-thread) -> FunctionPoint. A Feature drives behaviour (`requires`); it does not structurally own it."
  structure: "Module -> EngineeringFrame (durable module-internal responsibility slice) -> FunctionPoint (`anchors`). The structural axis is claim-agnostic (ADR-0157 §3)."
  evidence: "FunctionPoint -> Contract Surface -> Generated Fact -> Gate. Cite fact ids, never prose (ai-reading-path output_discipline)."
  per_function_point_facets:
    - "value     — required_by_features + requirement (value axis incidence)"
    - "structure — anchored_by_frames + owner_module (structure axis incidence)"
    - "join      — channel + actor + trigger (where value meets structure)"
    - "evidence  — contract_op / code_symbol / test fact ids"
    - "decision  — source ADR fact ids (authority for existence + scope)"
    - "governance— relevant rules/enforcers (optional; absence is not a defect)"

id_formats:
  feature: "FEAT-<SCREAMING-KEBAB> (SAA Feature saa.id)"
  engineering_frame: "EF-<SCREAMING-KEBAB> (SAA EngineeringFrame saa.id)"
  function_point: "FP-<SCREAMING-KEBAB> (SAA FunctionPoint saa.id)"
  module: "short module name (SAA Module saa.id / saa.owner; element genModule_<snake>)"
  code_symbol: "code-symbol/<kebab-fqn> (dots->hyphens, lowercase) — architecture/facts/generated/code-symbols.json"
  test: "test/<kebab-fqn> — architecture/facts/generated/tests.json"
  contract_op: "contract-op/<kebab-op-id> — architecture/facts/generated/contract-surfaces.json"
  adr: "adr/<4-digit>-<kebab-slug> — architecture/facts/generated/adrs.json"

# --- Structure axis roots: the six fixed domain modules + BoM + starter --------
modules:
  - {id: agent-client,            plane: edge,            kind: domain, note: "Edge SDK / client-side ingress + capability publication (skeleton)."}
  - {id: agent-bus,               plane: bus_state,       kind: domain, note: "Ingress / S2C transport / channel isolation / neutral engine port + orchestration SPI."}
  - {id: agent-middleware,        plane: compute_control, kind: domain, note: "Runtime middleware hook surface + cross-cutting capability SPI families."}
  - {id: agent-execution-engine,  plane: compute_control, kind: domain, note: "Engine contract surface — registry / executor adapter lifecycle."}
  - {id: agent-evolve,            plane: evolution,       kind: domain, note: "Run/trajectory export + online-evaluation hooks (skeleton)."}
  - {id: agent-service,           plane: compute_control, kind: domain, note: "Access/admission, task control, session/task state, engine dispatch, event queue, translation intercept."}
  - {id: spring-ai-ascend-graphmemory-starter, plane: bus_state, kind: starter, note: "Spring Boot starter auto-wiring GraphMemoryRepository SPI (disabled by default)."}

