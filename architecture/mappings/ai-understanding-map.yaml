# --- value x structure reconciliation: Feature -> traverses -> EngineeringFrame
# ADR-0157 §2 makes `traverses` a first-class AUTHORED value-axis edge: the DSL is
# authoritative. This block exposes the JOIN-derivable subset (Feature requires FP
# AND Frame anchors FP) and flags edges authored-direct because the target frame
# anchors no shipped FunctionPoint yet (permitted by ADR-0157 §3). An AI can use
# join_derivable to independently confirm the DSL `traverses` edges, and
# authored_direct_only to see which routes rest solely on the authored edge.
derived_feature_traversals:
  derivation_rule: "feature TRAVERSES frame  iff  exists fp such that (feature requires fp) AND (frame anchors fp)."
  authority: "The DSL `traverses` edge in engineering-frames.dsl is authoritative. The join is an advisory cross-check, NOT a replacement. authored_direct_only edges are legitimate (target frame is design_only with no anchored shipped FP)."
  entries:
    - feature: FEAT-RUN-LIFECYCLE-CONTROL
      authored_traverses: [EF-ACCESS-ADMISSION, EF-TASK-CONTROL, EF-SESSION-TASK-STATE]
      join_derivable: [EF-ACCESS-ADMISSION, EF-TASK-CONTROL, EF-SESSION-TASK-STATE]
      authored_direct_only: []
    - feature: FEAT-EDGE-COMPUTE-INGRESS
      authored_traverses: [EF-INGRESS-GATEWAY]
      join_derivable: [EF-INGRESS-GATEWAY]
      authored_direct_only: []
    - feature: FEAT-SERVER-CLIENT-CALLBACK
      authored_traverses: [EF-S2C-TRANSPORT]
      join_derivable: [EF-S2C-TRANSPORT]
      authored_direct_only: []
    - feature: FEAT-SUSPEND-RESUME-CONTROL
      authored_traverses: [EF-TASK-CONTROL, EF-ORCHESTRATION-SPI]
      join_derivable: [EF-TASK-CONTROL]
      authored_direct_only: [EF-ORCHESTRATION-SPI]
    - feature: FEAT-IDEMPOTENCY-AND-REPLAY
      authored_traverses: [EF-ACCESS-ADMISSION]
      join_derivable: [EF-ACCESS-ADMISSION]
      authored_direct_only: []
    - feature: FEAT-TENANT-ISOLATION
      authored_traverses: [EF-ACCESS-ADMISSION]
      join_derivable: [EF-ACCESS-ADMISSION]
      authored_direct_only: []
    - feature: FEAT-POSTURE-BOOTSTRAP
      authored_traverses: [EF-ACCESS-ADMISSION]
      join_derivable: [EF-ACCESS-ADMISSION]
      authored_direct_only: []
    - feature: FEAT-GRAPH-MEMORY
      authored_traverses: [EF-GRAPHMEMORY-AUTOCONFIG]
      join_derivable: [EF-GRAPHMEMORY-AUTOCONFIG]
      authored_direct_only: []
    - feature: FEAT-ENGINE-DISPATCH-AND-HOOKS
      authored_traverses: [EF-ENGINE-DISPATCH, EF-HOOK-SURFACE, EF-ENGINE-REGISTRY, EF-TRANSLATION-INTERCEPT, EF-ENGINE-PORT]
      join_derivable: [EF-HOOK-SURFACE, EF-ENGINE-REGISTRY]
      authored_direct_only: [EF-ENGINE-DISPATCH, EF-TRANSLATION-INTERCEPT, EF-ENGINE-PORT]
