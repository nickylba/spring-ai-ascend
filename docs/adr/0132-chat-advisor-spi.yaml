id: ADR-0132
title: "ChatAdvisor SPI: a platform-owned around-call advisor seam that decorates the model gateway for the application-developer audience"
status: accepted
product_claim: "PC-001|PC-004"
date: 2026-05-25
level: L1
view: development
affects_level: L0, L1
affects_view: development, logical
authors:
  - chao
relates_to:
  - ADR-0121    # ModelGateway SPI (advisor chain wraps model invocation)
  - ADR-0129    # Streaming-aware ModelGateway (streaming advisor sibling)
  - ADR-0125    # Spring AI canonical integration boundary (Path a)
  - ADR-0073    # Engine hooks + HookPoint (advisor chain binds inside BEFORE_LLM/AFTER_LLM brackets)
  - ADR-0128    # Audience-B / starter-defaults posture (advisors are Audience B extension surface)
context: |
  The senior-architect L0 review identified the absence of a
  `ChatAdvisor` interceptor SPI as a contract-layer defect
  (finding P0-3): Spring AI's `ChatClientAdvisor` ergonomics —
  around-call decoration of LLM invocations for PII redaction,
  memory retrieval augmentation, cost attribution, response
  caching — are missing from the platform. Without a
  platform-owned advisor pattern, Audience B (application
  developers) is forced to either:

  - (a) reach for `org.springframework.ai.chat.client.advisor.*`
    directly, which breaks the decoration boundary established
    by ADR-0125 (Path a), or
  - (b) reach for the platform's `HookDispatcher`, which is
    gate-private engine machinery (ADR-0073) and must NOT be
    part of the public Audience B surface.

  ADR-0125 resolved the Spring AI integration boundary in favour
  of Path (a) — Spring AI is canonical and the platform
  decorates. ADR-0121 specified the `ModelGateway` invocation
  shape. This ADR specifies the around-call interceptor pattern
  that wraps `ModelGateway.invoke(...)` and gives Audience B a
  composable extension seam that mirrors Spring AI's
  `ChatClientAdvisor` ergonomics without coupling to the
  Spring AI type.

decision: |
  Establish the `ChatAdvisor` capability SPI as a platform-owned
  boundary identity in the agent-middleware module — the
  `com.huawei.ascend.middleware.advisor.spi` package, a sibling
  capability family of the `EF-CAPABILITY-SPI` EngineeringFrame
  (ADR-0157). The boundary, not its method-level shape, is the
  standing decision of this ADR.

  - **Boundary identity (the L1 decision)**: the application-developer
    audience composes around-call advice against a platform SPI in
    `com.huawei.ascend.middleware.advisor.spi`, not against
    `org.springframework.ai.chat.client.advisor.*` (a provider type)
    and not against the gate-private engine hook dispatcher. A
    streaming advisor sibling lives in the same package so streaming
    advice composes without crossing the model SPI boundary. The SPI
    is pure Java per Rule R-D / Rule R-C.c (it imports the JDK only and
    carries a non-blank tenant identity on its request/response
    envelope), and it stays framework-free so any plane can realise it.

  - **Decoration boundary (the governing principle this SPI realises)**:
    the provider (Spring AI) is canonical and the platform DECORATES it
    (the Path-(a) boundary fixed at L0 by ADR-0125); a tenant-scoped,
    ordered, platform-owned advisor chain wraps the model gateway
    (ADR-0121), and the engine hook dispatcher stays platform-internal.
    The application audience attaches advisors at agent-definition time
    and never imports the hook dispatcher, so a change to hook
    granularity (ADR-0073) never becomes a contract-breaking event on
    the public surface. An advisor may short-circuit the chain by
    returning a synthetic response (policy denial, cache hit,
    redaction) instead of continuing it.

  Status: design_only at landing; runtime_enforced when the W2 LLM
  gateway implementation ships per ADR-0061 §7 (the Telemetry Vertical
  co-arrives with the Hook SPI activation). No production advisor
  binding exists today.

  The concrete advisor interface shape (the advisor / streaming-advisor
  / chain method signatures), the advisor value-type record inventory
  (the advised request / response / model-request / message / tool-call
  / usage / finish-reason / model-response carriers and the sealed
  stream-chunk variants), and the per-agent advisor-binding carrier are
  L1 public-SPI-surface + contract-envelope realisation detail. They
  are owned by the contract surface `docs/contracts/chat-advisor.v1.yaml`
  (status: design_only, runtime_enforced: false) and the generated
  code-symbol facts for the advisor package — this ADR cites them, it
  does not restate them. The W2 hook-binding RUNTIME SEQUENCE (the
  `advisor-model-hook-order/v1` step order that places the advisor
  chain relative to the BEFORE_LLM / AFTER_LLM hook brackets around the
  model gateway) is L2 runtime detail, owned by the L2 sink
  `architecture/docs/L2/capability-spi/chat-advisor-binding.md` and the
  contract's `binding` block. Catalog row, module-metadata, and DFX
  updates land in the parity-consolidator wave that follows this one.

consequences: |
  Positive:
  - Audience B writes against `ChatAdvisor` (platform), not
    `org.springframework.ai.chat.client.advisor.*` (provider),
    preserving the decoration boundary.
  - `HookDispatcher` stays platform-internal — gate-private
    engine machinery is no longer the only seam customers can
    reach for, closing the temptation to import it from
    `examples/**`.
  - Tenant-scoped advisor envelopes allow per-tenant policy
    attachment (PII denylists, cost-attribution rules) at the W2
    wave without changing the boundary contract.
  - Typed same-package advisor request/response carriers preserve strict
    no-cross-SPI dependency purity while giving W2 implementers a stable
    model-call vocabulary (the carrier shapes are owned by the contract
    surface, not restated here).
  - Around-call ordering is explicit and stable, and the chain seam
    supports both inbound mutation (e.g. retrieval augmentation
    rewriting the request) and outbound mutation (e.g. citation
    injection rewriting the response); the ordering and chain method
    shapes are contract detail (`docs/contracts/chat-advisor.v1.yaml`).

  Negative / residual:
  - `ChatAdvisor` is design_only until W2; no runtime binding
    today. The Audience-B-extension-seams ArchUnit guard is
    vacuous at L0 (no `examples/**` directory exists) and arms
    automatically when examples land in W3.
  - Runtime binding for both synchronous and streaming advisors is
    still design_only until W2; the contract surface is complete, but
    no production chain executor exists today.

alternatives_considered: |
  - (A) Express advisors as `Plan.steps` with memory-scope
    pre/post hooks. Rejected — couples retrieval/redaction
    semantics to the planner SPI (ADR-0126); the planner is
    about workflow shape, not model-call decoration. Audience B
    composing advisors does not require touching the planner.
  - (B) Re-export Spring AI `ChatClientAdvisor` directly as the
    platform's interface. Rejected by ADR-0125 (Path c).
    Audience B would couple to a provider type with no platform
    decoration seam and no platform tenant carrier.
  - (C) Make `HookDispatcher` part of the public Audience B
    surface. Rejected — `HookDispatcher` is gate-private engine
    machinery (ADR-0073). Public hooks would force every hook
    semantic change to be a contract-breaking event and would
    expose internal `HookPoint` granularity to customers.
