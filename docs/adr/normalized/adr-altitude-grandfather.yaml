# Layer-Purity By-ADR Grandfather list -- known L2/L3/L4/L6/L7/L8 code detail
# asserted as current authority on the BY-ADR surface (the remediation ledger's
# entries for accepted Markdown/locked ADRs that author a leaked L0 section-4
# constraint), not yet demoted by a normalized view.
#
# Authority: ADR-0159 (Progressive Learning Curve and Authority Lanes) section 7
#   + section 9; ADR-0160 (ADR Governance Model). Companion policy:
#   docs/governance/layer-purity-policy.yaml (the owns/forbids category
#   vocabulary every row here cites; the SAME vocabulary the L0/L1 helpers and
#   the status-ledger grandfather consume). The adjudicated verdict that
#   motivates this file (the "L0/L1 carries L2/code detail" critique is TRUE) is
#   recorded in docs/governance/remediation-inventory/layer-purity-scan.md
#   section 0 and the 2026-05-29 engineering-governance systemic-remediation
#   response; it is NOT re-litigated here.
#
# Why this file exists, and why it is SEPARATE from the L0/L1 list
#   (docs/governance/layer-purity-temporary-violations.yaml) and the
#   status-ledger list (docs/governance/layer-purity-status-ledger-grandfather.yaml).
#   The remediation drained the L0/L1 ARCHITECTURE.md prose COPIES (W12/W13) and
#   built the ADR-governance machinery (the ADR-0160 model, adr-taxonomy.yaml
#   altitude policy, adr-governance-policy.yaml, the remediation ledger, the 90
#   YAML-ADR normalized views), but DEFERRED authoring normalized views for the
#   Markdown/locked ADRs to a later wave (tracked per-entry as required_follow_up
#   / due_wave W6 in docs/governance/adr-remediation-ledger.yaml). Two facts make
#   the by-adr surface a real, unscanned altitude leak:
#     1. The remediation ledger asserts every such ADR at current_state
#        active_guidance with normalized_path "" -- so each ADR's leaked
#        L2/L3/L4/L6/L7/L8 detail (SQL CREATE TABLE / SET LOCAL / Flyway
#        filenames; HTTP 201/400/403/404/409/422 + route-verb; OTLP/HTTP wire +
#        gen_ai.* / langfuse.* namespaces + sampling %; sealed-interface and
#        method/field signatures; named *IT test inventories) is read by review
#        as CURRENT AUTHORITY with no demotion.
#     2. The altitude gate is structurally BLIND to it. Rule G-28 /
#        gate/lib/check_adr_taxonomy.py validates decision_type against
#        forbidden_decision_types ONLY for docs/adr/normalized/ADR-NNNN.yaml
#        views -- with no view it never fires on the raw ADR. Rule G-28 /
#        gate/lib/check_historical_adr_governance.py only REQUIRES a view for an
#        ADR whose architecture/facts/generated/adrs.json status is accepted, and
#        the Markdown/locked ADRs are absent from that YAML-only fact layer -- so
#        no view is even demanded for them. The leak therefore persists at its
#        normative source while CI stays green.
#   This file FREEZES each KNOWN leak the same way the status-ledger grandfather
#   freezes a known allowed_claim leak: a per-surface, dated, closed grandfather
#   list that demotes the leak to non-authoritative (quoted as evidence, never as
#   a live claim) and pins a sunset_date by which the demotion MUST complete (by
#   authoring the ADR's normalized view, whose non_authoritative_legacy_content /
#   l2_refs quarantine the detail, OR by widening AdrFactExtractor to the
#   Markdown/locked sources so Rule G-28 view coverage becomes demandable --
#   whichever the W6 normalization wave chooses). It is NOT an ADR-NNNN.yaml view,
#   so the Rule G-28 view validator (which globs ADR-*.yaml and filters
#   ^ADR-\d{4}\.yaml$) does not read it; it lives beside the views because it is
#   the by-adr demotion layer peer to those views.
#
#   But -- and this is the load-bearing correction -- freezing the known leaks is
#   NOT the same as CLOSING the by-authority-surface gap, and this list does not
#   close it. The status-ledger grandfather has an EXECUTABLE BACKSTOP that this
#   file does NOT: Rule G-34 / enforcer E201 (gate/lib/check_status_claim_altitude.py)
#   mechanically scans EVERY allowed_claim value on its surface, so an allowed_claim
#   leak that is neither demoted nor grandfathered FAILS the gate as a
#   non-grandfathered finding -- the list cannot silently under-claim because the
#   gate, not the list, enumerates the surface. The by-adr surface has no such
#   gate (it is registered nowhere in layer-purity-policy.yaml#governed_surfaces;
#   its executable enforcer is the W6 follow-up, not yet authored), so NOTHING
#   fails when an accepted Markdown/locked ADR that authors a leaked L0 section-4
#   constraint is given neither a normalized view nor a row here. The
#   completeness of the freeze therefore depends entirely on reviewer
#   enumeration, and the list is NON-EXHAUSTIVE by construction (see the
#   `completeness` block below for the population denominator and the unlisted
#   remainder). A closed + advisory + non-exhaustive list over an UN-GATED
#   authority surface cannot detect its own omissions -- which is the
#   non-vacuity weakness "a drift-detector that detects nothing must fail loudly"
#   (the rc36 auto-discovering-gate lesson) applied to a HAND-curated list
#   instead of a discovered one. The genuine close is the deferred
#   AdrFactExtractor widening (the ledger's own required_follow_up / due_wave W6):
#   once the Markdown/locked sources enter the adrs.json fact layer, Rule G-28
#   check_historical_adr_governance.py DEMANDS a normalized view for each, and the
#   missing-view condition becomes a hard finding -- the executable backstop this
#   list lacks today. Until then this file is the BEST-EFFORT freeze of the
#   enumerated-so-far leaks, NOT a complete demotion of the surface.
#
# Reading discipline (binding, ADR-0160 + ADR-0154 cascade). This file is a
#   READABLE INTERPRETATION layer over the raw Markdown/locked ADR sources and
#   the remediation ledger. It INVENTS NO ADR ids and NO relationships; every row
#   names an ADR id that already exists in docs/adr/ and re-states (does not mint)
#   which clause of that ADR is a leaked-altitude assertion. Authority cascade is
#   unchanged: generated facts > DSL > Card/prose; this file never outranks a
#   generated fact and never edits the ledger (owned by the
#   adr-remediation-ledger reconcile step) or the raw ADR.
#
# What this file is NOT. A migration plan, a rule card, an enforcer row, or a
#   normalized ADR view. It does not move any L2 detail; the actual migration
#   (authoring the per-ADR normalized view + landing the demoted detail in
#   architecture/docs/L2/ + docs/contracts/*.v1.yaml + the generated facts) is the
#   W6 normalization wave. It does not register itself as a governed_surface in
#   docs/governance/layer-purity-policy.yaml or wire a gate -- that registration +
#   the executable by-adr altitude enforcer (a free G-band rule + E-band enforcer
#   per ADR-0159 section 9) are owned by the reconcile / governance wave; this
#   file is the policy DATA that wave consumes, authored now so the gate, on
#   landing, starts changed-files-blocking against a dated baseline rather than
#   hard-blocking the corpus (avoids the ratchet-promotion-without-baseline
#   defect). Recurring-defect family: F-architecture-authority-fragmentation (the
#   ALTITUDE-fragmentation variant -- one concern's authority split across layers,
#   here the leaked L0 section-4 constraint asserted at full altitude on the
#   by-adr surface while its L0 prose copy was drained).
#
# Schema (mirrors docs/governance/layer-purity-status-ledger-grandfather.yaml so
# the per-surface allow-lists read identically):
#   schema_version  - integer, bumped when fields are added.
#   authority       - the ratifying ADR ids.
#   last_updated    - ISO yyyy-mm-dd (UTC). The freshness/sunset convention is
#                     UTC: a local +08 date can be UTC-future and trip a freshness
#                     gate, and a sunset comparison runs in UTC.
#   status          - advisory | blocking. The LIST's posture, not a
#                     contract-status enum (Rule 62 does not apply -- this is not
#                     a docs/contracts/*.v1.yaml). Advisory until the by-adr
#                     altitude ratchet is authored and promoted to full-blocking
#                     per ADR-0159 section 9.
#   list_closed     - true. Once the by-adr ratchet is full-blocking, no new entry
#                     may be added -- a new leaked-altitude ADR assertion must be
#                     demoted (its normalized view authored) at authoring time,
#                     never grandfathered.
#   surface         - the authority surface these rows demote: the by-adr surface
#                     (the remediation ledger entries for the named ADRs). Recorded
#                     once here so a row is unambiguously not an L0/L1 prose row
#                     and not a status-ledger allowed_claim row.
#   completeness    - REQUIRED. The honest record that this list is NON-EXHAUSTIVE
#                     over an UN-GATED surface, the population denominator it is a
#                     subset of, the unbacked-closure risk that follows, and the
#                     mechanical successor that closes it. This field exists
#                     because a closed grandfather list with no executable backstop
#                     CANNOT detect its own omissions (the non-vacuity weakness);
#                     it is the machine-readable form of the "load-bearing
#                     correction" paragraph in the header above. Sub-fields:
#       exhaustive            - false. The list freezes the reviewer-enumerated
#                               leaks, not the full by-adr leak set.
#       backstop              - none-yet | gated. `none-yet` until the by-adr
#                               altitude enforcer is authored (the W6 follow-up);
#                               flip to `gated` only when an executable gate
#                               enumerates the surface (then this whole list's
#                               completeness no longer depends on enumeration).
#       population            - the denominator the frozen rows are a subset of:
#                               the accepted Markdown/locked ADRs read as current
#                               authority on the by-adr surface, with the precise
#                               counts re-stated from the ledger (a readability
#                               aid; the ledger is the source of truth, this file
#                               mints no count it cannot derive from the ledger).
#       frozen_rows           - how many rows this list currently carries.
#       unlisted_estimate     - the population minus the frozen rows: the
#                               accepted-Markdown/locked ADRs at active_guidance
#                               with no view AND no row here, every one of which is
#                               read as current authority and is structurally
#                               invisible to Rule G-28 today.
#       unbacked_closure_risk - the named failure mode: nothing fails when an
#                               unlisted leaking ADR is given neither a view nor a
#                               row, so the freeze silently under-claims.
#       non_vacuity_guard     - the demand on the mechanical successor: when the
#                               by-adr enforcer / the widened AdrFactExtractor
#                               lands, it MUST be a COVERAGE gate that FAILS on any
#                               accepted Markdown/locked ADR lacking BOTH a
#                               normalized view AND (transitionally) a grandfather
#                               row -- it must not iterate only the rows present
#                               here (that would re-create the vacuity). Mirrors
#                               the rc36 rule "an auto-discovering gate must fail
#                               on zero / under-match".
#       permanent_close       - the single durable fix (re-stated from the ledger
#                               pointer): widen AdrFactExtractor to the
#                               Markdown/locked sources so Rule G-28 view coverage
#                               becomes demandable, at which point backstop flips
#                               to `gated` and this list is retired as views land.
#       family                - the recurring-defect family this completeness gap
#                               belongs to.
#   violations[]    - one row per leaked-altitude ADR assertion. Each row:
#       id          - stable kebab id, prefix LPV-ADR- (Layer-Purity Violation,
#                     By-ADR).
#       layer       - BY-ADR (the surface label; distinct from L0/L1 and
#                     STATUS-LEDGER).
#       adr         - REQUIRED. The ADR id whose leaked L0 section-4 constraint is
#                     asserted at full altitude on the by-adr surface (the durable
#                     anchor; matches an existing docs/adr/ source and a ledger
#                     entries[].adr). A row freezes EXACTLY ONE ADR.
#       raw_path    - the raw ADR source the leaked clause lives in (Markdown or
#                     locked Markdown; absent from the adrs.json fact layer, which
#                     is why no view is demanded today).
#       ledger_locus - the in-ledger anchor: the entries[].adr key whose
#                     normalized_path is "" and current_state is active_guidance,
#                     so the leaked detail is read as current authority. Line
#                     numbers drift as the ledger is edited; the ADR id is the
#                     durable handle.
#       l0_constraint - the leaked L0 section-4 constraint this ADR authors
#                     (re-stated from the raw ADR's own "section-4" / "new, this
#                     ADR" reference; the drained L0 prose copy is recorded in
#                     layer-purity-scan.md where applicable).
#       category    - the FIRST leaked-category id from layer-purity-policy.yaml
#                     (one of L1..L8) the clause carries, in policy order.
#       categories  - the full set of leaked categories the clause carries (used
#                     so the demotion is scoped to all of them before the row is
#                     retired).
#       trigger     - the smallest verbatim phrase(s) from the raw ADR that make
#                     the clause a leak. Quoted as EVIDENCE, never as a live claim.
#       migrate_to  - the authoritative home the detail must move to when the ADR's
#                     normalized view is authored (its l2_refs / contract_refs /
#                     fact_refs targets).
#       sunset_date - REQUIRED ISO yyyy-mm-dd by which the demotion MUST complete
#                     (the normalized view authored, this row removed). Tiered by
#                     priority: the ADRs the 2026-05-29 convergence-scan verdict
#                     and the round-3 residual NAMED are at the v1.0 boundary
#                     2026-06-30 (the by-adr surface is read by architecture review
#                     as current authority, so its named leaks share the
#                     highest-priority L0 sunset); the SIBLING leaked-constraint
#                     ADRs the same families surfaced but the round-3 residual did
#                     not enumerate are at 2026-08-31 (the lower-priority sibling
#                     tier the L0/L1 + status-ledger lists use). Both tiers are at
#                     or before the W6 normalization due_wave in the ledger.
#       verdict_named - true when the 2026-05-29 verdict / round-3 residual
#                     enumerated this exact ADR; false for a sibling the mechanical
#                     family scan found.
#       defensible_part - OPTIONAL note on the boundary-identity portion of the
#                     constraint that MAY stay at L0/L1 (and in the ADR's future
#                     active_guidance) after the leaked detail is demoted: a D1 SPI
#                     boundary identity, a D2 package decomposition, or a D3
#                     enforcer/gate citation, per the verdict rubric.

schema_version: 2
authority:
  - ADR-0159
  - ADR-0160
last_updated: 2026-05-30  # UTC date; a local +08 date is UTC-future and would fail Rule G-9.a freshness.
status: advisory
list_closed: true
surface: docs/governance/adr-remediation-ledger.yaml#entries  # the by-adr surface

# Completeness / non-vacuity record. This list is NON-EXHAUSTIVE over an UN-GATED
# surface, so -- unlike the E201-gated status-ledger grandfather -- it cannot
# detect its own omissions; this block states that honestly, with the denominator
# it is a subset of and the mechanical successor that closes the gap. See the
# "load-bearing correction" paragraph in the header. The counts are re-stated from
# docs/governance/adr-remediation-ledger.yaml#entries (the source of truth); this
# file mints no count it cannot derive from the ledger.
completeness:
  exhaustive: false
  backstop: none-yet   # flips to `gated` only when the by-adr altitude enforcer (W6 follow-up) enumerates the surface
  population:
    description: >
      The accepted Markdown/locked ADRs that are read as current authority on the
      by-adr surface -- the entries whose raw_path is docs/adr/*.md or
      docs/adr/locked/*.md (absent from the architecture/facts/generated/adrs.json
      YAML-only fact layer that AdrFactExtractor parses) AND whose current_state is
      active_guidance with normalized_path "". Every one of these is structurally
      invisible to Rule G-28 today (no normalized view is demanded because the raw
      ADR is absent from adrs.json), so its leaked L0 section-4 detail is read with
      no demotion. This is the denominator the frozen rows are a subset of.
    markdown_locked_total: 66          # 55 non-locked docs/adr/*.md + 11 docs/adr/locked/*.md
    markdown_locked_active_guidance: 65 # 54 non-locked .md + 11 locked .md at active_guidance (the in-scope set); the 1 remainder (ADR-0055) is superseded
  frozen_rows: 21        # this file's violations[] count (verdict tier + sibling tier)
  unlisted_estimate: 44  # markdown_locked_active_guidance (65) - frozen_rows (21): accepted Markdown/locked ADRs at active_guidance with NEITHER a normalized view NOR a row here; not all author a leak, but none is mechanically screened, so the leaking subset among them is undetected
  unbacked_closure_risk: >
    list_closed is true and status is advisory, but no executable gate scans the
    by-adr surface, so nothing fails when an accepted Markdown/locked ADR that
    authors a leaked L0 section-4 constraint (SQL/RLS/GUC, HTTP status/route-verb,
    OTLP/HTTP wire + gen_ai.*/langfuse.* namespaces + sampling %, sealed-interface
    + method/field signatures, named *IT inventories) is given neither a normalized
    view nor a grandfather row. The freeze then SILENTLY UNDER-CLAIMS: review reads
    the unlisted ADR's leaked detail as current authority and CI stays green. This
    is the same vacuity the rc36 audit found in three auto-discovering gate rules
    (they iterated empty/under-matched input sets and always passed) -- here applied
    to a HAND-curated list whose completeness depends on reviewer enumeration rather
    than a mechanical sweep over the ledger's accepted-Markdown/locked-ADR set.
  non_vacuity_guard: >
    BINDING on the mechanical successor. When the by-adr altitude enforcer (a free
    G-band rule + E-band enforcer per ADR-0159 section 9, owned by the
    reconcile/governance wave) is authored, it MUST be a COVERAGE gate over the
    surface: it FAILS when any accepted Markdown/locked ADR at active_guidance lacks
    BOTH a normalized view AND (transitionally, until its view lands) a still-open
    grandfather row -- i.e. it enumerates the LEDGER's accepted-Markdown/locked set
    and demands demotion for each, never iterating only the rows present in this
    file (iterating only present rows would re-create the vacuity this block
    records). It MUST also fail loudly on a zero/under-match of its discovery
    anchor, so a future ledger-format drift cannot silently empty its input set
    (the rc36 "a drift-detector that detects nothing must fail loudly" guard). The
    grandfather list is authored now so that gate, on landing, starts
    changed-files-blocking against this dated baseline rather than hard-blocking the
    corpus.
  permanent_close: >
    Widen AdrFactExtractor to the Markdown/locked sources (the ledger's own
    required_follow_up / due_wave W6) so the Markdown/locked ADRs enter the
    adrs.json fact layer; Rule G-28 check_historical_adr_governance.py then DEMANDS
    a normalized view for each accepted ADR, the missing-view condition becomes a
    hard finding, and `backstop` flips to `gated`. As each ADR's normalized view is
    authored (quarantining the detail in non_authoritative_legacy_content / l2_refs),
    its matching grandfather row is removed; the list retires when the last row is
    demoted.
  family: F-architecture-authority-fragmentation  # ALTITUDE-fragmentation variant (the by-adr leaked-altitude detail frozen via a hand-curated closed list, not a mechanical sweep)

violations:

  # ======================================================================
  # Verdict-named / round-residual leaks. Highest priority; sunset
  # 2026-06-30 (v1.0 boundary) -- the by-adr surface is read by architecture
  # review as current authority, so its named leaks share the L0
  # highest-priority sunset. These are the ADRs the convergence-scan
  # residual rounds enumerated as authoring a leaked L0 section-4 constraint
  # asserted at full altitude with no normalized view (ten from round-3, plus
  # the round-4 residual additions: the ADR-0057 W1-idempotency authoring
  # source -- whose SAME leaked L3-SQL + L7-signature tokens the remediation
  # had already frozen on the L0/L1 prose surface and the status-ledger
  # allowed_claim surface but, until that entry, not on its own by-adr surface
  # --; the ADR-0046 release-note-shipped-surface-truth source, which the
  # verdict cites via L0 section-4 #44 and whose RunContext method-list / source
  # line-range / named-test inventory remained a LIVE L7 leak on the by-adr
  # surface (layer-purity-scan.md section 1.2 #44) with no row until this entry;
  # and the ADR-0060 Phase-L-reviewer-remediation source, which RESTATES the
  # same POST/GET/cancel /v1/runs route x verb roster as the required OpenAPI
  # surface (the SAME L4 inventory the listed LPV-ADR-0040 W1-HTTP-routes/status
  # sibling froze) AND names a contract IT with its asserted runtime behaviour
  # (OpenApiContractIT.noUndocumentedV1OperationsExposedByLive "exercises the
  # new comparator" -- the SAME L8 named-*IT-with-behaviour shape the listed
  # LPV-ADR-0063 client-SDK sibling froze), yet had no by-adr row until this
  # entry; the enforcer E36 citation it carries is D3-defensible and stays).
  # ======================================================================

  - id: LPV-ADR-0005-set-local-rls-trigger
    layer: BY-ADR
    adr: ADR-0005
    raw_path: docs/adr/locked/0005-tenant-isolation-guc-set-local.md
    ledger_locus: "entries[].adr ADR-0005 (normalized_path '', current_state active_guidance)"
    l0_constraint: "L0 section-4 #3 -- tenant isolation (the drained L0 prose copy is recorded in layer-purity-scan.md section 1.5; the leaked persistence mechanism still lives in this ADR)"
    category: L3-sql-rls-persistence
    categories: [L3-sql-rls-persistence]
