clean_decision_summary: |
  Lands the chat-advisor as a public SPI boundary identity in the agent-middleware
  module: a platform-owned around-call advisor seam (the
  com.huawei.ascend.middleware.advisor.spi package, a sibling capability family of
  EF-CAPABILITY-SPI) that the application-developer audience composes against to
  decorate model invocations — instead of reaching for the provider's advisor type
  directly (which breaks the Spring-AI-is-canonical / platform-decorates boundary)
  or for the gate-private engine hook dispatcher (which must NOT be public). The
  standing decision is the advisor boundary identity + its tenant-scoped, ordered,
  pure-Java contract, governed by the DECORATION BOUNDARY principle (the provider
  is canonical and the platform decorates; the advisor chain wraps the model
  gateway; the hook dispatcher stays platform-internal). The concrete advisor
  interface shape, its value records, and the W2 hook-binding runtime sequence are
  the contract / L2 realisation (a design-only contract surface plus an L2 sink),
  not standing L1 authority.

active_guidance:
  - "The platform exposes a platform-owned around-call advisor seam that decorates model invocation for the application-developer audience; developers compose advisors at agent-definition time and never import the gate-private engine hook dispatcher."
  - "Decoration boundary: the provider (Spring AI) is canonical and the platform DECORATES it; the application audience writes against the platform advisor SPI, not against the provider's advisor type, preserving the integration boundary."
  - "The advisor chain is tenant-scoped (the advised request/response carry a non-blank tenant id) and ordered (a stable order() determines inbound execution); an advisor may short-circuit by returning a synthetic response (policy denial, cache hit, redaction)."
  - "The engine hook dispatcher remains platform-internal; the BEFORE_LLM / AFTER_LLM hook brackets bound the advisor chain but hooks are not part of the public audience surface (keeping hook-granularity changes from becoming contract-breaking events)."

non_authoritative_legacy_content:
  - "The concrete advisor INTERFACE SHAPE (the advisorName / order / aroundCall method signatures; the streaming-advisor aroundStream sibling; the advisor-chain next / proceed signatures) is contract realisation detail below the L1 boundary identity: it is owned by docs/contracts/chat-advisor.v1.yaml and the generated code-symbol facts for the advisor package, not restated as standing L1 authority. (The package home com.huawei.ascend.middleware.advisor.spi.* is the boundary IDENTITY and remains an L1 anchor — see l1_refs.)"
  - "The value-type record inventory (AdvisedRequest / AdvisedResponse / AdvisedModelRequest / AdvisedMessage / AdvisedToolCall / AdvisedUsage / AdvisedFinishReason / AdvisedModelResponse / AdvisedStreamChunk and its sealed variants) is contract-envelope detail owned by the contract surface and the generated facts."
  - "The W2 hook-binding RUNTIME SEQUENCE (the advisor-model-hook-order/v1 step order: translate ModelInvocation -> AdvisedRequest, fire BEFORE_LLM, run the chain, invoke the terminal gateway, outbound transforms, translate back, fire AFTER_LLM) is an L2 runtime-sequence owned by the L2 sink architecture/docs/L2/capability-spi/chat-advisor-binding.md and the contract's binding block; the standing decision is the boundary identity + decoration principle, not the sequence."
  - "design_only / runtime_enforced staging notes, the vacuous-until-examples ArchUnit guard, and the catalog/module-metadata/DFX follow-up are wave/process detail owned by release notes and the gate surfaces."

