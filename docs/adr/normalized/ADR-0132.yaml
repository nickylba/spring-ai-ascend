review_notes: |
  Lane: L4-FRAME (ADR-0159). Layer-purity reclassification (the LAYER-PURITY FLAG
  raised in the 2026-05-29 remediation review is now RESOLVED at source, not
  deferred): the raw ADR previously self-labelled level: L0 while its decision
  block decided an L1 public-SPI-surface + contract + L2 runtime-sequence payload
  (three interface signatures, a value-record inventory, and a step-ordered W2
  hook-binding sequence) — the "L0 contains L1/L2 detail" leakage adjudicated TRUE.
  This is the same re-altitude applied to the sibling capability-SPI ADRs (the
  model-gateway ADR-0121, the memory / planner SPIs): a public-SPI-surface decision
  is a FORBIDDEN lower-altitude leak at L0 and is DEFENSIBLE at L1 (adr-taxonomy).
  The raw ADR has been reduced accordingly — level: L1, the leaked method
  signatures / value records pushed to docs/contracts/chat-advisor.v1.yaml + the
  generated code-symbol facts, and the W2 runtime sequence pushed to the L2 sink
  architecture/docs/L2/capability-spi/chat-advisor-binding.md — so the normalized
  decision_level is L1 (decision_type public_spi_surface), with L0 retained in
  affected_levels because the SPI realises the L0 decoration-boundary principle
  (Spring AI canonical / platform decorates, ADR-0125). That principle is NOT
  hoisted to a separate L0 note: it is the governing RATIONALE of this L1 boundary
  decision and is owned at L0 by ADR-0125; this view re-states it as active_guidance
  to keep the boundary citeable. current_state active_guidance: the advisor boundary
  identity + the decoration boundary govern today even though the SPI is
  design_only (no production binding; runtime_enforced at W2 per ADR-0061 §7).
  superseded_by / supersedes empty (raw declares only relates_to; no supersession
  edge in the fact layer).
