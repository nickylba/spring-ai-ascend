# Normalized ADR index -- the machine-readable enumeration of every normalized
# ADR view, with each view's current authority state and routing pointers.
#
# Authority: ADR-0160 (ADR Governance Model) -- decision (2): "Normalized ADR
# views -- docs/adr/normalized/ADR-NNNN.yaml, one per accepted ADR, plus
# docs/adr/normalized/index.yaml." This file is that index. It is the structured
# companion to the human-readable docs/adr/review-index.md: the AI reading path
# (docs/governance/ai-reading-path.yaml step 3 "architecture_anchor") points
# sessions here to learn the current decision-authority state of the ADR corpus
# without re-reading raw historical prose (ADR-0160 consequences -- forward-looking).
#
# READABLE-INTERPRETATION DISCIPLINE (binding, ADR-0160 + ADR-0154 cascade):
# this index is an interpretation layer OVER the normalized views
# (docs/adr/normalized/ADR-NNNN.yaml) and the apex raw-ADR fact source
# (architecture/facts/generated/adrs.json, the AdrFactExtractor projection of
# docs/adr/*.yaml). It INVENTS NO ADR ids and NO relationships: every entry field
# is transcribed from the view it points at (or, for corpus scope, from the fact
# source); the supersedes / superseded_by lists are re-stated from the views, not
# minted here. Authority cascade is unchanged: generated facts > DSL > Card/prose;
# this index never outranks a generated fact, and a normalized view never outranks
# a generated fact. The per-ADR authority detail (clean_decision_summary,
# active_guidance clauses, non_authoritative_legacy_content) lives in the view
# itself, NOT here -- this index carries only the structural routing fields so it
# cannot drift from the views it enumerates.
#
# Schema source: docs/governance/adr-governance-policy.yaml (required fields +
# closed five-value current_state set + state invariants) and
# docs/governance/adr-taxonomy.yaml (decision_level / affected_levels /
# decision_type altitude). Each view is validated against those by Rule G-28 via
# gate/lib/check_adr_taxonomy.py; ledger totality + normalized-view coverage are
# checked by gate/lib/check_historical_adr_governance.py. This index is NOT itself
# a gate-schema input (the view validator filters to ADR-NNNN.yaml and skips
# index.yaml); it is the enumeration surface the reading path and review consume.
#
# REGENERATION: this index is assembled by reading the on-disk normalized views
# and counting the current_state each declares; it is regenerated, not
# hand-amended. When a generator emits it, the generator obeys the Rule G-13
# single-source byte-identical re-render contract (ADR-0119): re-read every file
# under docs/adr/normalized/ (and architecture/facts/generated/adrs.json for
# corpus scope), re-derive the entries + counts, and re-emit -- never edit a count
# or an entry out of step with the views.
#
# UTC date for any date field (CI runs the gate in UTC; the local +08 date is
# UTC-future and would fail Rule G-9.a).

inventory_id: ADR-NORMALIZED-INDEX
governance_infra: true
wave: W5
phase: ledger-and-index-assembly
authority: ADR-0160
schema_refs:
  - docs/governance/adr-governance-policy.yaml
  - docs/governance/adr-taxonomy.yaml
source_of_truth:
  - docs/adr/normalized/*.yaml
  - architecture/facts/generated/adrs.json
companions:
  human_readable_review_index: docs/adr/review-index.md
  per_adr_remediation_ledger: docs/governance/adr-remediation-ledger.yaml
  corpus_census: docs/governance/remediation-inventory/adr-census.md
last_updated: 2026-05-29

# How architecture review uses each current_state (ADR-0160 decision (2) /
# adr-governance-policy.yaml#current_states.review_behavior). The per-entry
# `review_use` field below collapses the five states into the three review
# partitions the reading path branches on; the precise per-state behavior is:
#   active_guidance      Current decision authority. Citeable as governing architecture.
#   partial_guidance     Some guidance still active, some content stale/lower-level/
#                        superseded. Citeable ONLY through the view's active_guidance
#                        clauses; its non_authoritative_legacy_content is not authority.
#   superseded           Replaced by a later decision. NOT citeable as current
#                        authority (history only); cite the superseded_by replacement.
#   historical_evidence  Explains why the system evolved; governs nothing now.
#                        Citeable for context only.
#   remediation_record   Captures cleanup work or review findings. Citeable for
#                        governance traceability, not architecture authority.
#
# review_use vocabulary (derived field; NOT a new authority axis):
#   current_authority -> current_state in {active_guidance, partial_guidance};
#                        citeable as governing architecture (partial only through
#                        its active_guidance clauses).
#   context_only      -> current_state in {historical_evidence, remediation_record};
#                        citeable for context / governance traceability only.
#   history_only      -> current_state == superseded; not citeable as current
#                        authority -- cite the superseded_by replacement's view.
review_use_vocabulary:
  current_authority: "current_state in {active_guidance, partial_guidance}"
  context_only: "current_state in {historical_evidence, remediation_record}"
  history_only: "current_state == superseded"

# Per-entry schema. One entry per normalized view file under
# docs/adr/normalized/, sorted by ADR id. Every field is transcribed from the
# view (or, for review_use, derived from its current_state):
#   adr             ADR id (matches the view filename ADR-NNNN.yaml).
#   normalized_path Repo-relative path to the normalized view (the per-ADR authority detail).
#   raw_path        Repo-relative path to the raw ADR source the view reads.
#   current_state   The view's declared current_state (closed five-value set).
#   review_use      Derived review partition (see review_use_vocabulary above).
#   decision_level  Where the decision is MADE (adr-taxonomy.yaml#decision_levels key).
#   decision_type   The view's decision_type (allowed at decision_level per the taxonomy).
#   affected_levels What the decision touches (adr-taxonomy.yaml#affected_level_vocabulary).
#   view            ADR-0068 view axis token OR an authority-surface label.
#   supersedes      ADR ids this decision replaces, re-stated from the view (not minted).
#   superseded_by   ADR id(s) that replace this one, re-stated from the view (not minted).
