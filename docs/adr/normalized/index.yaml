# Raw YAML ADRs present in the apex fact source
# (architecture/facts/generated/adrs.json) that have NO normalized view. Per
# ADR-0160 only an `accepted` raw ADR REQUIRES a normalized view; a purely
# superseded/archived raw ADR may legitimately carry none (the replacement's view
# is the authority). The sole entry here is ADR-0079 (raw status `superseded`,
# superseded_by ADR-0088 -- re-stated in ADR-0088's normalized view supersedes
# list): not a review-blocking gap, because it is not `accepted`. There are zero
# `accepted` raw ADRs without a view (the G-28 acceptance bar is met).
unclassified_raw_yaml_adrs:
- adr: ADR-0079
  raw_status: superseded

# Aggregate counts -- a direct tally of the current_state each on-disk normalized
# view declares, cross-referenced with the fact-layer corpus scope. These mirror
# the human-readable tallies in docs/adr/review-index.md (assert no authority of
# their own; an interpretation over the views + adrs.json). Corpus-scope note:
# the fact layer enumerates only the YAML ADRs (the census baseline at source
# commit 98a58c1 counted 88; ADR-0159 / ADR-0160 / ADR-0161 were added by the
# progressive-learning-curve remediation after that commit, so the live fact
# layer now carries 91). The 56 Markdown active/deferred and 11 locked Markdown
# ADRs are real governing decisions absent from the fact layer (the standing gap
# recorded in docs/governance/remediation-inventory/adr-census.md and ADR-0160
# context); they are ledger-tracked, not yet normalized, and out of this index's
# YAML-corpus scope.
counts:
  raw_yaml_adrs_in_fact_layer: 91
  normalized_views: 90
  raw_yaml_adrs_without_view: 1
  by_current_state:
    active_guidance: 26
    partial_guidance: 55
    superseded: 1
    historical_evidence: 1
