contract: Agent-Bus-Forwarding-Runtime
status: draft
version: v1
provider: agent-bus
consumer: agent-runtime
candidate: C3-database-outbox-inbox
description: "agent-bus 类 MQ 转发的运行态承载（C3 outbox/inbox）record schema：durable、可审计、tenant-scoped、broker-agnostic。Stage 7–11 交付 schema + 端口 + 状态机 + lease-safe + dispatch-loop + runtime-completion；Stage 12 落地真实持久化（Postgres JDBC adapter + Flyway migration + RLS）；Stage 13 完成 transport 投递模型候选评审（T1-T4 × 8 维度，T3 consumer-pull over DB 非裁决推荐）；Stage 14 落地 deliver 重投策略先行（retry policy 端口 + overflow-safe 指数退避 + exhausted→DLQ + 熔断端口 deferred，§6.2 不变）。真实投递绑定仍 deferred（待 H2/H3 裁决 push / pull / MQ）。"
authority:
  icd_design: ICD-agent-bus-forwarding.md
  l2: architecture/docs/L2/agent-bus/forwarding-outbox-inbox.md
  decision: docs/architecture/l0/10-governance/review-packets/agent-bus-forwarding-runtime-decision.md
outbox_record:
  description: "发送端 durable queue record；承载一条 forwarding 消息从入队到终态（ACKED/DLQ/EXPIRED）。"
  required:
    - field: tenantId
      type: string
      mutable: false
      owner: caller-and-discovery-tenant-scope
      pii: tenant-identifier-audit-retained
      rule: R-C.c
      constraint: non-blank; must equal routeHandle tenantScope
    - field: messageId
      type: string
      mutable: false
      owner: forwarding-substrate
      pii: opaque-no-redact
      constraint: non-blank
    - field: sourceServiceId
      type: string
      mutable: false
      owner: caller
      pii: service-identifier-audit-retained
    - field: targetServiceId
      type: string
      mutable: false
      owner: discovery-via-routeHandle
      pii: service-identifier-audit-retained
      constraint: from Stage 3 discovery, not a physical endpoint
    - field: routeHandle
      type: string
      mutable: false
      owner: discovery
      pii: opaque-no-redact
      constraint: opaque; encapsulates endpoint/topic/routeKey; never expose physical endpoint
    - field: status
      type: enum
      enum: [PENDING, DISPATCHING, ACKED, RETRY_SCHEDULED, DLQ, EXPIRED]
      mutable: true
      owner: dispatcher-state-machine
      pii: enum-no-redact
    - field: attemptCount
      type: integer
      mutable: true
      owner: dispatcher
      pii: count-no-redact
      constraint: starts at 0; increments on each RETRY
    - field: createdAt
      type: epoch-millis
      mutable: false
      owner: substrate
      pii: timestamp-no-redact
    - field: updatedAt
      type: epoch-millis
      mutable: true
      owner: substrate
      pii: timestamp-no-redact
  conditional:
    - field: payloadRef
      type: string
      mutable: false
      owner: caller
      pii: reference-no-inline-body
      required_when: payloadPolicy == DATA_BEARING
      rule: MI5-003-option-B
      constraint: payload follows data reference path; optional for CONTROL_ONLY
    - field: nextAttemptAt
      type: epoch-millis
      mutable: true
      owner: dispatcher
      pii: timestamp-no-redact
      required_when: status == RETRY_SCHEDULED
    - field: lastFailureCode
      type: enum
      enum: [route_not_found, tenant_mismatch, delivery_timeout, receiver_unavailable, backpressure_rejected, duplicate_suppressed, payload_ref_invalid]
      mutable: true
      owner: dispatcher
      pii: enum-no-redact
      required_when: status in [RETRY_SCHEDULED, DLQ, EXPIRED]
      nullable_when: status == ACKED
  stage8_additive:
    - field: lease
      type: object
      projection: "ForwardingLease on ForwardingOutboxRecord (nested: leaseOwner string, leaseUntilMillisEpoch epoch-millis); DDL columns lease_owner / lease_until"
      mutable: true
      owner: dispatcher-worker-claim
      pii: owner-identifier-audit-retained
      rule: MI8-001
      constraint: "at most one active lease per record; expired lease reclaimable; terminal never leased"
  unique_key: [tenantId, messageId]
inbox_record:
  description: "接收端去重 / 幂等 / 审计 record。"
  required:
    - field: tenantId
      type: string
      mutable: false
      owner: receiver-validation
      pii: tenant-identifier-audit-retained
      rule: R-C.c
      constraint: must equal message envelope tenantId
    - field: messageId
      type: string
      mutable: false
      owner: forwarding-substrate
      pii: opaque-no-redact
      constraint: non-blank
    - field: consumerServiceId
      type: string
      mutable: false
      owner: receiver
      pii: service-identifier-audit-retained
      constraint: distinct consumers dedup independently
    - field: status
      type: enum
      enum: [RECEIVED, DUPLICATE_SUPPRESSED, CONSUMED, REJECTED]
      mutable: true
      owner: inbox-state-machine
      pii: enum-no-redact
    - field: receivedAt
      type: epoch-millis
      mutable: false
      owner: inbox
      pii: timestamp-no-redact
  conditional:
    - field: consumedAt
      type: epoch-millis
      mutable: true
      owner: receiver
      pii: timestamp-no-redact
      required_when: status == CONSUMED
    - field: failureCode
      type: enum
      enum: [tenant_mismatch, payload_ref_invalid, duplicate_suppressed]
      mutable: true
      owner: inbox
      pii: enum-no-redact
      required_when: status in [REJECTED, DUPLICATE_SUPPRESSED]
  dedup_key: [tenantId, messageId, consumerServiceId]
forbidden_fields:
  - payload_body
  - token_stream
  - task_execution_state
  - physical_endpoint
forbidden_fields_note: "outbox/inbox record 始终不得包含 payload body / token stream / Task execution state / 物理 endpoint；大载荷走 payloadRef data reference path；转发方只持 opaque routeHandle。"
state_machine:
  authority: architecture/docs/L2/agent-bus/forwarding-outbox-inbox.md#4
  outbox_terminal: [ACKED, DLQ, EXPIRED]
  inbox_terminal: [DUPLICATE_SUPPRESSED, CONSUMED, REJECTED]
  illegal_transition: throws IllegalStateTransitionException
failure_codes:
  non_retryable:
    - route_not_found
    - tenant_mismatch
    - payload_ref_invalid
  retryable:
    - delivery_timeout
    - receiver_unavailable
    - backpressure_rejected
  dedup:
    - duplicate_suppressed
tenant_isolation:
  tenant_id_mandatory: true
  cross_tenant_query: explicit_failure
  cross_tenant_fallback: forbidden
  rule: R-C.c
lifecycle_ownership:
  bus_writes_task_execution_state: false
  changes_remote_task_owner: false
broker_posture: broker-agnostic
claim_lease:
  authority: architecture/docs/L2/agent-bus/forwarding-persistence.md#4
  port: ForwardingOutboxClaimPort
  replaces: findRetryable(now)
  semantics:
    - tenant-scoped claim (Rule R-C.c)
    - one active lease owner per record at a time
    - expired lease reclaimable by another owner
    - nextAttemptAt <= now or fresh PENDING is due
    - terminal never claimable
    - claim + state transition atomic (single tx / CAS)
    - state mutation (ACK/RETRY/DLQ/EXPIRE) is lease-owner guarded; a stale/foreign/expired owner is rejected, not applied (MI9-001)
    - ACKED/DLQ/EXPIRED/RETRY_SCHEDULED clear the lease; only DISPATCHING holds one (MI9-002)
stage7_scope:
  delivers: [schema-draft, port-interfaces, state-machine, harness, in-memory-test-double]
  not_delivers: [jdbc-driver, real-db-implementation, migration, polling, lease, concurrent-claim, real-delivery-binding]
  next_stage: Stage-8
stage8_scope:
  delivers: [record-models, claim-lease-port, dispatcher-worker-skeleton, delivery-port, schema-ddl-draft-not-executed, in-memory-lease-harness]
  not_delivers: [jdbc-driver, flyway-migration, real-db-implementation, polling-cadence, real-delivery-binding]
  next_stage: Stage-9
stage9_scope:
  delivers: [lease-owner-guarded-mutation, lease-lifecycle-closure, record-condition-invariants-in-java-and-ddl-check, failure-code-classification, claim-and-state-update-sql-contract, in-memory-lease-guard-harness]
  not_delivers: [jdbc-driver, flyway-migration, real-db-implementation, real-delivery-binding]
  path: B  # DB/migration ownership not yet human-confirmed; no JDBC/Flyway in agent-bus
  next_stage: Stage-10-plus
stage10_scope:
  delivers: [worker-lease-exception-recovery-skip, lease-renewal-policy-before-delivery, dispatch-tick-result-skipped-observability, dispatch-loop-skeleton-injected-trigger-no-scheduler]
  not_delivers: [jdbc-driver, flyway-migration, real-db-implementation, real-delivery-binding, real-scheduler-thread-pool]
  path: B  # DB/migration ownership re-confirmed as path B by human (Stage 10 slice 4); no JDBC/Flyway in agent-bus
  next_stage: Stage-11-plus
stage11_scope:
  delivers: [lease-renewal-timing-on-injected-epochclock, deliver-non-lease-exception-swallowed-as-skipped, runonce-fail-fast-contract-loop-propagates]
  not_delivers: [jdbc-driver, flyway-migration, real-db-implementation, real-delivery-binding, real-scheduler-thread-pool]
  path: B  # DB/migration/transport ownership not human-confirmed; runtime-completion only; no JDBC/Flyway/transport in agent-bus
  next_stage: Stage-12-plus
stage12_scope:
  delivers: [postgres-jdbc-adapter-spring-jdbc, flyway-migration-v1, rls-defence-in-depth, real-sql-verification]
  not_delivers: [concrete-broker-mq, real-delivery-binding, real-scheduler-thread-pool]
  path: real-persistence  # §6.1 "no JDBC" lifted by Stage 12 H2/H3; agent-bus becomes a Spring module; ArchUnit confines Spring/JDBC to persistence.jdbc subpackage; §6.2 unchanged
  next_stage: Stage-13-completed
stage13_scope:
  delivers: [transport-delivery-model-candidates-review, t1-dispatcher-push-sync-rpc, t2-dispatcher-push-broker, t3-consumer-pull-db, t4-c3-broker-hybrid, scoring-matrix-4x8, backpressure-root-cause-analysis, non-decision-recommendation-t3, deliver-retry-policy-subitem]
  not_delivers: [production-code, transport-implementation, broker-binding, §6.2-lift]
  nature: decision-review  # 裁决阶段、无生产代码（性质同 Stage 5）；4 投递模型候选 × 8 维度评分矩阵；核心结论「反压内核=消费方控速，MQ 只是载体之一」；T3 consumer-pull over DB 作为非裁决推荐（唯一不破 §6.2 的强反压候选，复用 Stage 12 claim/lease/SKIP LOCKED/RLS）；deliver 异常重投策略拆为可独立先行子项
  next_stage: Stage-14-plus-or-h2h3-transport-decision
stage14_scope:
  delivers: [forwarding-retry-policy-port, exponential-backoff-overflow-safe, exhausted-to-dlq-routing, deliver-result-next-attempt-removed, circuit-breaker-port-deferred-not-wired]
  not_delivers: [transport-implementation, broker-binding, circuit-breaker-wired-to-worker, real-scheduler-thread-pool]
  path: B  # transport-independent: retry timing does not depend on push/pull/MQ (Stage 13 undecided); no transport/broker/scheduler introduced; §6.2 unchanged
  next_stage: Stage-15-plus-or-h2h3-transport-decision
compatibility:
  additive_fields_allowed: true
  breaking_change_requires_adr: true
contract_tests:
  - forwarding_runtime_outbox_record_has_required_fields
  - forwarding_runtime_inbox_record_has_required_fields
  - forwarding_runtime_outbox_unique_key_is_tenant_and_message_id
  - forwarding_runtime_inbox_dedup_key_includes_consumer
  - forwarding_runtime_forbids_payload_body_token_stream_task_state_endpoint
  - forwarding_runtime_status_values_match_l2_state_machine
  - forwarding_runtime_failure_codes_cover_l2_semantics
  - forwarding_runtime_outbox_record_carries_source_and_target_service_id
  - claim_due_returns_only_tenant_scoped_due_non_terminal_records
  - claim_due_grants_exclusive_lease_one_owner_at_a_time
  - expired_lease_can_be_reclaimed
  - terminal_outbox_record_is_not_claimable
  - dispatcher_worker_routes_ack_retry_dlq_expired_via_fake_delivery
  - forwarding_persistence_does_not_write_task_state_nor_introduce_broker
  - stale_worker_acks_after_lease_reclaimed_by_another_owner_fails
  - lease_guarded_mutation_reports_record_not_found_and_no_lease
  - terminal_and_retry_states_clear_lease_only_dispatching_holds_it
  - outbox_record_rejects_invalid_status_invariants
  - inbox_record_rejects_invalid_status_invariants
  - failure_code_classification_drives_retry_and_dlq_routing
  - forwarding_persistence_ddl_enforces_record_invariants
  - worker_skips_record_when_lease_reclaimed_mid_tick
  - worker_renews_short_lease_before_delivery
  - worker_does_not_renew_when_lease_sufficient
  - worker_skips_when_lease_renew_fails
  - dispatch_loop_drives_ticks_from_injected_source_until_it_stops
  - worker_skips_record_when_delivery_throws
  - run_once_fails_fast_on_blank_tenant_and_loop_propagates
  - retry_policy_backoff_is_monotonic_and_capped
  - retry_policy_jitter_is_added_and_negative_clamped
  - retry_policy_exhausted_flips_at_budget
  - worker_routes_exhausted_retryable_failure_to_dlq
  - worker_retries_then_exhausts_to_dlq
