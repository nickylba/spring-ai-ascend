# DFX (Design-for-X) declaration for the agent-service module.
#
# Required by CLAUDE.md Rule R-D — every module declared `kind: domain` MUST
# publish a DFX yaml covering all five dimensions.
#
# Authority: ADR-0161 (agent-service serviceization).

module: agent-service
kind: domain
version: 1
generated_at: 2026-06-11

spi_packages:
  - com.huawei.ascend.service.spi             # shared error vocabulary for the three seams
  - com.huawei.ascend.service.spi.registry    # RuntimeRegistry — runtime registration + lease/TTL state
  - com.huawei.ascend.service.spi.discovery   # AgentDirectory — tenant-scoped agent cards + route resolution
  - com.huawei.ascend.service.spi.routing     # RouteGrantService — HMAC-signed east-west route grants

releasability:
  artifact_coords: "com.huawei.ascend:agent-service"
  semver_policy: "0.x — public surface is the Spring-free service SPI (service.spi.*), the reference implementations in service.core, and the self-registration client in service.client"
  deprecation_window: "two minor versions on SPI; one on non-SPI"
  packaging: "plain Spring-free library jar; the HTTP/DI edge ships separately in agent-service-starter (ADR-0161)"

resilience:
  fallback_paths: []   # a route grant that fails validation or an unknown agent route fails the call (AgentRouteNotFoundException / GatewayErrorCode) — no silent rerouting
  posture_aware_defaults: "in-memory reference implementations (InMemoryRuntimeRegistry, MaskedAgentDirectory, HmacRouteGrantService with InMemoryRouteGrantCache) bind in the starter behind @ConditionalOnMissingBean; deployments replace them by contributing beans"
  cancellation_contract: "not applicable — agent-service forwards A2A byte-level; run cancellation is owned by agent-runtime's A2A surface"
  reference_rule: "registration liveness is lease-based: register announces the instance, lease renewals keep it alive, expiry drops it from discovery"

availability:
  health_endpoints: []   # the module is Spring-free; GET /v1/agents?tenantId=... on the starter edge doubles as the probe (empty tenant returns [])
  readiness_signal: "library-internal — a registry entry with a live lease is discoverable; deregistration or lease expiry removes it"
  startup_failure_modes:
    - "starter edge enabled without a route-grant secret override — the built-in default only serves local development (documented in docs/quickstart.md §7)"

vulnerability:
  scan_tooling: "manual review at L1; rides the reactor's dependency pinning (parent BoM)"
  auth_surface: "east-west calls carry HMAC-signed route grants (HmacRouteGrantService resolve + validate); the starter edge optionally adds the JWT tenant cross-check filter (agent-service.access.jwt.*, ADR-0040 shape)"
  tenant_isolation: "discovery and route resolution are tenant-scoped (AgentDirectory takes tenantId on every call); served agent cards can be masked onto a public base URL so back-end runtime topology never leaks (MaskedAgentDirectory)"
  secret_handling: "route-grant secrets and JWT secrets arrive via configuration properties, never hardcoded; grants are validated, not trusted"
  spi_purity: "the whole module is Spring-free and reaches agent-runtime only through engine.spi; any dependency on org.springframework.. or the frozen bus SPI plane (com.huawei.ascend.bus.spi..) is forbidden — enforced by ServicePackageBoundaryTest"

observability:
  metric_namespace: "none in this module — the Spring-free core emits no meters; HTTP-edge observability lives with the starter"
  trace_propagation: "A2A forwarding is byte-level pass-through — inbound trace headers ride through to the target runtime untouched"
  log_field_shape: "slf4j-api only"
  audit_trail: "registration / lease / deregistration outcomes are returned as typed results (RuntimeRegistrationResult / RuntimeLeaseResult / RuntimeDeregisterResult) for the caller to record"
