# Layer-Purity Status-Ledger Grandfather list -- known L2/code detail in the
# capability-status ledger's allowed_claim narrative, not yet migrated.
#
# Authority: ADR-0159 (Progressive Learning Curve and Authority Lanes) section 7
#   + section 9. Companion policy: docs/governance/layer-purity-policy.yaml (the
#   owns/forbids category vocabulary every row here cites; the SAME vocabulary
#   the L0/L1 helpers consume). Consumed by Rule G-34 / enforcer E201
#   (gate/lib/check_status_claim_altitude.py).
#
# Why this file exists, and why it is SEPARATE from
#   docs/governance/layer-purity-temporary-violations.yaml. The two existing
#   layer-purity helpers scan only the L0/L1 architecture documents:
#     * gate/lib/check_layer_purity.py   (E194) -> architecture/docs/L0|L1/**.md
#     * gate/lib/check_l2_detail_sink.py (E195) -> the same two roots
#   But docs/governance/architecture-status.yaml#allowed_claim is a free-form
#   narrative field with NO altitude guard, and per the authority cascade
#   (generated facts > DSL > Card/prose) the capability ledger OUTRANKS the
#   L0/L1 prose -- yet nothing scanned it, so it organically accreted exactly the
#   leaked categories the adjudicated verdict named (SQL / ON CONFLICT / PRIMARY
#   KEY; HTTP status + route-verb + wire error tokens; @Order tie-break +
#   Class.getName(); DROP_OLDEST buffer + W3C traceparent + OTLP/HTTP; method
#   signatures + call chains; enumerated *IT test inventories). E201 closes that
#   by-authority-surface gap on this single ledger surface. Its tolerance rows
#   live here, in a per-surface allow-list, rather than appended to the L0/L1
#   list, because the two surfaces have different owners and different gates: a
#   per-surface file keeps each gate's allow-list cohesive and avoids
#   write-contention on one shared file. The CATEGORY VOCABULARY stays shared
#   and single-source (layer-purity-policy.yaml), so both surfaces are judged by
#   ONE verdict; only the per-surface tolerance rows are split. A row here is
#   INERT for E194/E195 regardless -- those helpers never read this file.
#
# What this file IS. The closed, dated grandfather list of L2/code detail that
#   currently sits in an allowed_claim value of the capability ledger in
#   violation of the layer-purity policy, but has not yet been migrated to its
#   authoritative home (architecture/docs/L2/ + docs/contracts/ + the generated
#   facts). Each entry freezes one known leak AND declares a per-entry
#   sunset_date by which the migration MUST complete and the row MUST be removed
#   (a closed-but-dateless grandfather list is an anti-pattern). This list is
#   closed: once the E201 ratchet is full-blocking, no new entry may be added --
#   a new claim-altitude leak must be fixed (or the claim re-altituded) at
#   authoring time, never grandfathered.
#
# What this file is NOT. A migration plan, a rule card, or an enforcer row. The
#   ledger itself (docs/governance/architecture-status.yaml) is owned by the
#   status-ledger reconcile step; this file does not edit it -- it records which
#   of its claim leaks are tolerated, with a deadline. The authority cascade
#   (generated facts > DSL > Card/prose) is untouched: this file invents no id
#   and no relationship and never outranks a generated fact.
#
# Schema (mirrors layer-purity-temporary-violations.yaml so the two allow-lists
# read identically):
#   schema_version  - integer, bumped when fields are added.
#   authority       - the ratifying ADR id.
#   last_updated    - ISO yyyy-mm-dd (UTC). The freshness/sunset convention is
#                     UTC: a local +08 date can be UTC-future and trip a
#                     freshness gate, and the E201 sunset comparison runs in UTC.
#   status          - advisory | blocking. The LIST's posture, not a
#                     contract-status enum (Rule 62 does not apply -- this is not
#                     a docs/contracts/*.v1.yaml). Advisory until the E201
#                     ratchet promotes to full-blocking per ADR-0159 section 9.
#   list_closed     - true.
#   violations[]    - one row per known ledger leak. Each row:
#       id          - stable kebab id, prefix LPV-SL- (Layer-Purity Violation,
#                     Status-Ledger).
#       layer       - STATUS-LEDGER (the surface label; distinct from L0/L1 so a
#                     row here is unambiguously not an L0/L1 prose row).
#       file        - docs/governance/architecture-status.yaml (the offending
#                     authority surface; E201 matches a row to a finding by this
#                     path + capability + category).
#       capability  - REQUIRED. The ledger capability KEY whose allowed_claim
#                     leaks (the in-file anchor; the human-stable handle the
#                     reconcile step edits). E201 matches a row to a finding by
#                     capability so a row freezes EXACTLY ONE claim -- because
#                     every leak on this surface shares the same file, a row with
#                     no capability would suppress unrelated same-category claims
#                     and E201 rejects it (config error).
#       locus       - capability key + the 1-based allowed_claim source line as
#                     observed by the E201 advisory scan; for cross-reference,
#                     NOT a code fact (line numbers drift as the ledger is
#                     edited; the capability key is the durable anchor).
#       category    - the leaked-category id from layer-purity-policy.yaml (one
#                     of L1..L8) the E201 probe library reports for this claim.
#                     E201 reports the FIRST matching category in policy order;
#                     a claim may leak more than one, recorded in categories[]
#                     when the verdict named several so the migration is scoped
#                     to all of them. The reported first-match category MUST be
#                     among category/categories or the row will not suppress.
#       categories  - OPTIONAL list when a single claim leaks more than one
#                     category (used instead of `category`). The row tolerates a
#                     finding in ANY listed category, so the migration removes
#                     every named category before the row is retired.
#       trigger     - the smallest verbatim phrase from the allowed_claim that
#                     makes it a leak. Quoted as EVIDENCE, never as a live claim.
#       migrate_to  - the authoritative home the detail must move to.
#       sunset_date - REQUIRED ISO yyyy-mm-dd by which migration MUST complete
#                     and this row MUST be removed. Tiered by priority: the leaks
#                     the 2026-05-29 convergence-scan verdict NAMED are at the
#                     v1.0 boundary 2026-06-30 (the ledger outranks the L0/L1
#                     prose, so its named leaks share the highest-priority L0
#                     sunset); the SIBLING leaks the per-claim altitude scan
#                     surfaced but the verdict did not enumerate are at
#                     2026-08-31 (the same lower-priority tier the L0/L1 list
#                     uses for other-module / sibling leaks).
#       verdict_named - true when the 2026-05-29 convergence-scan round-2 verdict
#                     enumerated this exact locus; false for a sibling leak the
#                     E201 mechanical scan found in the same families.
#       defensible_part - OPTIONAL note on the identity / evidence portion of a
#                     mixed claim that MAY stay after the leaked detail is
#                     extracted (e.g. the structural capability identity, the
#                     ADR/enforcer citation, the development-view file index).
#
# Coverage note. The E201 advisory scan over the 149 allowed_claim values found
#   19 leaks; all 19 are frozen below so the changed-files-blocking rung is clean
#   (a reconcile-step edit to the ledger does not trip the gate on pre-existing
#   debt). Eight are verdict_named; eleven are siblings in the same families. One
#   verdict-cited locus -- run_status_transition_validator
#   ("RunStateMachine.validate(from, to)" + "Run.withStatus/withSuspension call
#   validate") -- does NOT trip E201: the shared L7 / L1-call-chain probes
#   require a typed-arg / arrow-syntax shape ("m(args) -> ReturnType",
#   "a(...) -> b("), which the untyped-arg + prose-verb claim lacks, exactly as
#   the same probes do not fire on that prose at L0/L1. A grandfather row that
#   suppresses no live finding is dead weight under the closed-list discipline,
#   so that locus is intentionally NOT given a row; the reconcile step should
#   still drain its method-signature / call-chain prose when it cleans the
#   neighbouring rows, and a future probe widening (if any) would surface it.

