<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="980" viewBox="0 0 1560 980" role="img" aria-labelledby="title desc">
  <title id="title">Sandbox Invocation Sequence</title>
  <desc id="desc">Untrusted skill invocation through agent-service SandboxGateway, agent-bus sandbox protocol, and an external containerized sandbox service.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f3a4a"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
      .head { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.3; rx: 8; }
      .svc { fill: #ecfdf5; stroke: #059669; stroke-width: 1.3; rx: 8; }
      .bus { fill: #fef3c7; stroke: #d97706; stroke-width: 1.3; rx: 8; }
      .worker { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; rx: 8; }
      .label { font: 13px Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px Arial, sans-serif; fill: #334155; }
      .note { fill: #fff7ed; stroke: #f97316; stroke-width: 1.2; rx: 8; }
      .noteText { font: 13px Arial, sans-serif; fill: #7c2d12; }
      .line { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 5 5; }
      .msg { stroke: #2f3a4a; stroke-width: 1.7; marker-end: url(#arrow); fill: none; }
      .return { stroke: #475569; stroke-width: 1.5; stroke-dasharray: 6 4; marker-end: url(#arrow); fill: none; }
      .deny { stroke: #dc2626; stroke-width: 1.7; marker-end: url(#arrow); fill: none; }
      .ok { stroke: #059669; stroke-width: 1.7; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>
  <rect class="bg" width="1560" height="980"/>
  <text class="title" x="40" y="48">Sandbox Invocation Sequence</text>
  <text class="subtitle" x="40" y="76">Sandbox is an external containerized execution resource. The repo owns protocol, gateway, policy hooks, and the untrusted execution boundary.</text>

  <g id="participants">
    <rect class="head" x="35" y="110" width="155" height="52"/>
    <text class="label" x="60" y="132">Client</text>
    <text class="small" x="55" y="150">Run requester</text>
    <line class="line" x1="112" y1="162" x2="112" y2="920"/>

    <rect class="head" x="220" y="110" width="175" height="52"/>
    <text class="label" x="242" y="132">agent-service</text>
    <text class="small" x="236" y="150">Run lifecycle</text>
    <line class="line" x1="307" y1="162" x2="307" y2="920"/>

    <rect class="head" x="425" y="110" width="190" height="52"/>
    <text class="label" x="444" y="132">agent-execution-engine</text>
    <text class="small" x="462" y="150">Boundary only</text>
    <line class="line" x1="520" y1="162" x2="520" y2="920"/>

    <rect class="head" x="645" y="110" width="165" height="52"/>
    <text class="label" x="666" y="132">agent-middleware</text>
    <text class="small" x="674" y="150">Policy hooks</text>
    <line class="line" x1="727" y1="162" x2="727" y2="920"/>

    <rect class="head" x="840" y="110" width="170" height="52"/>
    <text class="label" x="865" y="132">SandboxGateway</text>
    <text class="small" x="862" y="150">Thin client</text>
    <line class="line" x1="925" y1="162" x2="925" y2="920"/>

    <rect class="bus" x="1040" y="110" width="145" height="52"/>
    <text class="label" x="1074" y="132">agent-bus</text>
    <text class="small" x="1056" y="150">sandbox protocol</text>
    <line class="line" x1="1112" y1="162" x2="1112" y2="920"/>

    <rect class="svc" x="1215" y="110" width="170" height="52"/>
    <text class="label" x="1235" y="132">sandbox service</text>
    <text class="small" x="1230" y="150">Pool + isolation</text>
    <line class="line" x1="1300" y1="162" x2="1300" y2="920"/>

    <rect class="worker" x="1410" y="110" width="120" height="52"/>
    <text class="label" x="1430" y="132">Worker</text>
    <text class="small" x="1425" y="150">Docker/Pod</text>
    <line class="line" x1="1470" y1="162" x2="1470" y2="920"/>
  </g>

  <g id="messages">
    <path class="msg" d="M112 205 H307"/>
    <text class="small" x="145" y="196">POST /v1/runs</text>

    <path class="msg" d="M307 250 H520"/>
    <text class="small" x="350" y="241">dispatch run</text>

    <path class="msg" d="M520 295 H727"/>
    <text class="small" x="555" y="286">BEFORE_TOOL_INVOCATION</text>

    <path class="return" d="M727 340 H520"/>
    <text class="small" x="555" y="331">Proceed: profile + policy + grant</text>

    <path class="return" d="M520 385 H307"/>
    <text class="small" x="345" y="376">untrusted boundary, no direct execution</text>

    <path class="msg" d="M307 430 H925"/>
    <text class="small" x="515" y="421">invokeSandbox(request, policyRef, trace)</text>

    <path class="msg" d="M925 475 H1112"/>
    <text class="small" x="952" y="466">SandboxInvocationRequest</text>

    <path class="msg" d="M1112 520 H1300"/>
    <text class="small" x="1150" y="511">deliver invocation</text>

    <rect class="note" x="1188" y="545" width="250" height="60"/>
    <text class="noteText" x="1205" y="568">Sandbox service checks:</text>
    <text class="noteText" x="1205" y="588">logical grant &lt;= physical policy</text>

    <path class="deny" d="M1300 635 H1112"/>
    <text class="small" x="1145" y="626">Denied: policy violation</text>
    <path class="return" d="M1112 670 H925"/>
    <text class="small" x="965" y="661">stable error</text>
    <path class="return" d="M925 705 H307"/>
    <text class="small" x="545" y="696">sandbox_policy_violation</text>

    <path class="ok" d="M1300 750 H1470"/>
    <text class="small" x="1322" y="741">invoke in container</text>
    <path class="return" d="M1470 790 H1300"/>
    <text class="small" x="1320" y="781">stdout/stderr/result/usage</text>
    <path class="return" d="M1300 830 H1112"/>
    <text class="small" x="1143" y="821">SandboxInvocationResult</text>
    <path class="return" d="M1112 865 H925"/>
    <path class="return" d="M925 895 H307"/>
    <text class="small" x="515" y="886">SandboxResult + auditRefs</text>
    <path class="return" d="M307 925 H112"/>
    <text class="small" x="145" y="916">cursor / status evidence</text>
  </g>
</svg>
