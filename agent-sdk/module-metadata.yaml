# Module metadata for agent-sdk.
# Required by CLAUDE.md Rule R-C sub-clause .b (Independent Module Evolution).
# Enforced by gate rule module_metadata_present_and_complete.

module: agent-sdk
kind: domain             # platform | domain | starter | bom | sample
version: 0.1.0-SNAPSHOT
semver_compatibility: experimental
description: "Agent definition SDK: loads declarative agent specs (ascend-agent/v1 YAML — framework, model, prompt, skills, tools with file/http/mcp refs), resolves tools, and adapts the spec into runnable openJiuwen agents exposed as agent-runtime AgentRuntimeHandlers."
spi_packages:
  # ToolResolver is the extension seam: register custom resolvers (and NativeTool
  # pass-through) on the AgentHandlerFactory builder for new ref schemes.
  - com.huawei.ascend.agentsdk.spec.tool
allowed_dependencies:
  - agent-runtime          # adapters extend the openJiuwen runtime handler base
  - agent-bus              # transitively via agent-runtime; no direct SPI consumption today
forbidden_dependencies:
  - agent-service          # SDK is consumed by applications, never by/through the facade
deployment_plane: compute_control   # SDK-built handlers run in-process with the runtime
